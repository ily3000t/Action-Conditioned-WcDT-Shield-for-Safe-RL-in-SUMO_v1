sim:
  backend: "traci"
  sumo_cfg: "scenarios/highway_merge/highway_merge.sumocfg"
  runtime_log_dir: "safe_rl_output/sumo_logs"
  sumo_home: "E:/Program Files/sumo-1.22.0"
  sumo_bin: "E:/Program Files/sumo-1.22.0/bin/sumo.exe"
  sumo_gui_bin: "E:/Program Files/sumo-1.22.0/bin/sumo-gui.exe"
  netconvert_bin: "E:/Program Files/sumo-1.22.0/bin/netconvert.exe"
  auto_build_network: true
  force_mock: false
  use_gui: false
  step_length: 0.1
  episode_steps: 150
  history_steps: 10
  future_steps: 8
  normal_episodes: 10
  risky_episodes: 10
  risk_event_prob: 0.15
  random_seed: 42
  ego_vehicle_id: "ego"

dataset:
  raw_log_dir: "safe_rl_output/debug_real/raw"
  dataset_dir: "safe_rl_output/debug_real/datasets"
  train_ratio: 0.7
  val_ratio: 0.1
  ttc_threshold: 2.0
  lane_violation_margin: 0.2

light_risk:
  hidden_dim: 64
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 1

world_model:
  multimodal: 3
  future_steps: 8
  hidden_dim: 128
  learning_rate: 0.0002
  batch_size: 8
  epochs: 1
  uncertainty_weight: 0.1

shield:
  candidate_count: 7
  coarse_top_k: 4
  tail_quantile: 0.9
  risk_threshold: 0.45
  uncertainty_threshold: 0.35
  uncertainty_weight: 0.2
  fallback_action: "DECEL_KEEP"

ppo:
  use_sb3: false
  total_timesteps: 200
  learning_rate: 0.0003
  gamma: 0.99
  n_steps: 64
  batch_size: 32
  n_epochs: 2
  intervene_penalty: 0.1
  device: "cpu"

distill:
  trigger_buffer_size: 50
  batch_size: 16
  learning_rate: 0.0005
  epochs: 1
  interval_steps: 100

eval:
  eval_episodes: 2
  seed_list: [42]
  target_collision_reduction: 0.1
  max_efficiency_drop: 0.5

tensorboard:
  enabled: true
  root_dir: "safe_rl_output/tensorboard"
  run_name: "debug_real_sumo"
  flush_secs: 5
