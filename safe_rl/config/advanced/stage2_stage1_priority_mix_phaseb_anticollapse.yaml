# Stage2-only experiment (v13): keep phase-b Stage1 priority mix, disable tail,
# and add light phase-b anti-collapse on priority Stage1 batches.

world_model:
  pair_ft_stage1_priority_mix_enabled: true
  pair_ft_stage1_priority_mix_fraction: 0.35
  pair_ft_stage1_priority_trusted_only: true
  pair_ft_stage1_tail_epochs: 0
  pair_ft_stage1_resolution_loss_weight: 0.02
  pair_ft_stage1_resolution_mode: "adaptive"
  pair_ft_stage1_resolution_min_score_gap: 0.018
  pair_ft_stage1_resolution_alpha: 0.2
  pair_ft_stage1_resolution_max_score_gap: 0.05
  pair_ft_selection_accuracy_tie_epsilon: 0.01
  pair_ft_stage1_phaseb_anticollapse_weight: 0.003
  pair_ft_stage1_phaseb_score_range_floor: 0.02
  pair_ft_stage1_phaseb_score_range_quantile_low: 0.10
  pair_ft_stage1_phaseb_score_range_quantile_high: 0.90
  pair_ft_stage1_phaseb_anticollapse_apply_on: "priority_only"

tensorboard:
  run_name: "stage2_stage1_priority_mix_phaseb_anticollapse"
