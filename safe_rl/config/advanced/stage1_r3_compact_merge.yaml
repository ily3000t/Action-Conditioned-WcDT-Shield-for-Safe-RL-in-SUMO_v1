tensorboard:
  run_name: "stage1_r3_compact_merge"

sim:
  scenario_variant: "stage1r_compact_merge_v1"

stage1_collection:
  probe_pair_target_risk_source: "calibrated_proxy_risk"
  probe_trusted_exclude_structural_dominant: true
  scene_sanity_merge_success_logic: "edge_route_based"
  scene_sanity_roi_auto_from_net: true
  scene_sanity_roi_half_width: 50.0
  scene_sanity_ramp_edges: ["ramp_in"]
  scene_sanity_main_downstream_edges: ["main_out"]
  scene_sanity_stuck_edge_prefixes: ["ramp_in", ":merge"]
  probe_pair_stratified_keep_enabled: true
  probe_pair_stratified_bins: 16
  probe_pair_keep_per_risk_bin: 32
  probe_pair_keep_per_gap_bin: 32
  probe_pair_min_total_per_active_bin: 16
  stage2_distribution_gate_enabled: true
  stage2_distribution_gate_block_on_status: "critical"
