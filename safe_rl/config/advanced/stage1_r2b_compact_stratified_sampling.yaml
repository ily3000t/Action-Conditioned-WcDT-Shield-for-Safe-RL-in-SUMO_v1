tensorboard:
  run_name: "stage1_r2b_compact_stratified_sampling"

sim:
  scenario_variant: "stage1r_compact_merge_v1"

stage1_collection:
  probe_pair_target_risk_source: "calibrated_proxy_risk"
  probe_trusted_exclude_structural_dominant: true

  scene_sanity_merge_success_logic: "edge_route_based"
  scene_sanity_roi_auto_from_net: true
  scene_sanity_structural_mode: "dominant_ratio"

  probe_pair_stratified_keep_enabled: true
  probe_pair_stratified_bins: 16
  probe_pair_keep_per_risk_bin: 48
  probe_pair_keep_per_gap_bin: 48
  probe_pair_min_total_per_active_bin: 24
  probe_pair_min_target_gap: 0.005
  probe_pair_boundary_gap_floor: 0.003
  probe_pair_boundary_keep_per_risky_step: 2
  probe_pair_max_pairs_per_step: 24

  stage2_distribution_gate_enabled: true
  stage2_distribution_gate_block_on_status: "critical"

  probe_calibrated_collision_weight: 3.0
  probe_calibrated_ttc_trigger_weight: 1.2
  probe_calibrated_lane_conflict_weight: 0.8
  probe_calibrated_structural_weight: 0.9
  probe_calibrated_teleport_weight: 0.8
  probe_calibrated_distance_weight: 1.0
  probe_calibrated_ttc_continuous_weight: 1.0
