sim:
  backend: "traci"
  sumo_cfg: ""
  use_gui: false
  step_length: 0.1
  episode_steps: 40
  history_steps: 6
  future_steps: 8
  normal_episodes: 3
  risky_episodes: 3
  risk_event_prob: 0.4
  random_seed: 7

dataset:
  raw_log_dir: "safe_rl_output/smoke/raw"
  dataset_dir: "safe_rl_output/smoke/datasets"
  train_ratio: 0.7
  val_ratio: 0.2
  ttc_threshold: 2.0
  lane_violation_margin: 0.2

light_risk:
  hidden_dim: 64
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0
  epochs: 2

world_model:
  multimodal: 3
  future_steps: 8
  hidden_dim: 128
  learning_rate: 0.0005
  batch_size: 4
  epochs: 1
  uncertainty_weight: 0.1

shield:
  candidate_count: 7
  coarse_top_k: 4
  tail_quantile: 0.9
  risk_threshold: 0.45
  uncertainty_threshold: 0.5
  uncertainty_weight: 0.1
  fallback_action: "DECEL_KEEP"

ppo:
  use_sb3: false
  total_timesteps: 200
  learning_rate: 0.0003
  gamma: 0.99
  n_steps: 64
  batch_size: 32
  n_epochs: 2
  intervene_penalty: 0.1

distill:
  trigger_buffer_size: 10
  batch_size: 8
  learning_rate: 0.001
  epochs: 2
  interval_steps: 100

eval:
  eval_episodes: 3
  seed_list: [7]
  target_collision_reduction: 0.1
  max_efficiency_drop: 0.5

tensorboard:
  enabled: true
  root_dir: "safe_rl_output/tensorboard"
  run_name: "smoke"
  flush_secs: 5