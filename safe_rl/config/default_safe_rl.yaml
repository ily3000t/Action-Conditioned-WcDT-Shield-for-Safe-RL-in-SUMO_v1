sim:
  backend: "traci"
  sumo_cfg: "scenarios/highway_merge/highway_merge.sumocfg"
  scenario_variant: "compact_midhigh_202604"
  net_file: ""
  route_file: ""
  runtime_log_dir: "safe_rl_output/sumo_logs"
  sumo_home: "E:/Program Files/sumo-1.22.0"
  sumo_bin: "E:/Program Files/sumo-1.22.0/bin/sumo.exe"
  sumo_gui_bin: "E:/Program Files/sumo-1.22.0/bin/sumo-gui.exe"
  netconvert_bin: "E:/Program Files/sumo-1.22.0/bin/netconvert.exe"
  auto_build_network: true
  force_mock: false
  use_gui: false
  step_length: 0.1
  episode_steps: 300
  history_steps: 10
  future_steps: 20
  normal_episodes: 200
  risky_episodes: 200
  risk_event_prob: 0.35
  random_seed: 42
  ego_vehicle_id: "ego"
  collision_action: "teleport"
  collision_stoptime: 1.0
  collision_check_junctions: true

dataset:
  raw_log_dir: "safe_rl_output/raw_logs"
  dataset_dir: "safe_rl_output/datasets"
  train_ratio: 0.8
  val_ratio: 0.1
  ttc_threshold: 2.0
  lane_violation_margin: 0.2

stage1_collection:
  probe_pair_min_target_gap: 0.01
  probe_pair_max_pairs_per_step: 12
  probe_pair_boundary_gap_floor: 0.005
  probe_pair_boundary_keep_per_risky_step: 1
  probe_pair_target_risk_source: "raw_proxy_risk"
  probe_calibrated_collision_weight: 3.0
  probe_calibrated_ttc_trigger_weight: 1.2
  probe_calibrated_lane_conflict_weight: 0.8
  probe_calibrated_structural_weight: 1.8
  probe_calibrated_teleport_weight: 2.0
  probe_calibrated_distance_weight: 1.0
  probe_calibrated_ttc_continuous_weight: 1.0
  probe_trusted_exclude_structural_dominant: false
  probe_pair_stratified_keep_enabled: false
  probe_pair_stratified_bins: 16
  probe_pair_keep_per_risk_bin: 32
  probe_pair_keep_per_gap_bin: 32
  probe_pair_min_total_per_active_bin: 16
  stage1_distribution_health_bins: 16
  stage1_distribution_healthy_pair_all_effective_min: 8.0
  stage1_distribution_healthy_pair_trusted_effective_min: 7.0
  stage1_distribution_healthy_candidate_effective_min: 3.0
  stage1_distribution_degraded_pair_all_effective_min: 6.0
  stage1_distribution_degraded_pair_trusted_effective_min: 5.0
  stage1_distribution_degraded_candidate_effective_min: 2.0
  stage1_distribution_high_bin_saturation_threshold: 0.85
  stage2_distribution_gate_enabled: false
  stage2_distribution_gate_block_on_status: "critical"
  scene_sanity_enabled: true
  scene_sanity_merge_success_logic: "y_threshold"
  scene_sanity_roi_auto_from_net: false
  scene_sanity_roi_half_width: 50.0
  scene_sanity_merge_x_override: 0.0
  scene_sanity_ramp_edges: ["ramp_in"]
  scene_sanity_main_downstream_edges: ["main_out"]
  scene_sanity_stuck_edge_prefixes: ["ramp_in", ":merge"]
  scene_sanity_merge_success_y_threshold: 0.0
  scene_sanity_stopped_speed_threshold: 0.5
  scene_sanity_stuck_min_wait_steps: 20
  scene_sanity_roi_x_min: 320.0
  scene_sanity_roi_x_max: 420.0
  scene_sanity_roi_y_min: -12.0
  scene_sanity_roi_y_max: 16.0
  scene_sanity_trigger_merge_success_min: 0.30
  scene_sanity_trigger_stuck_rate_max: 0.50
  scene_sanity_trigger_teleport_rate_max: 0.08
  scene_sanity_structural_mode: "any_episode"
  scene_sanity_structural_episode_ratio_threshold: 0.50
  scene_sanity_structural_episode_min_count: 3
  scene_sanity_trigger_structural_rate_max: 0.12
  scene_sanity_trigger_structural_dominant_rate_max: 0.35
  scene_sanity_trigger_structural_candidate_rate_max: 0.35
  scene_sanity_warning_structural_any_episode_rate_max: 0.50
  scene_sanity_trigger_structural_saturation_rate_max: 0.50
  scene_sanity_accept_merge_success_min: 0.45
  scene_sanity_accept_stuck_rate_max: 0.35
  scene_sanity_accept_teleport_rate_max: 0.08
  scene_sanity_accept_structural_rate_max: 0.12
  scene_sanity_accept_structural_dominant_rate_max: 0.25
  scene_sanity_accept_structural_candidate_rate_max: 0.25
  stage4_candidate_min_target_gap: 0.01

light_risk:
  hidden_dim: 128
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 50

world_model:
  multimodal: 6
  future_steps: 20
  hidden_dim: 256
  learning_rate: 0.0001
  batch_size: 16
  epochs: 20
  pair_finetune_epochs: 6
  pair_ft_early_stop_enabled: true
  stage5_pair_max_seen_per_epoch: 32
  pair_ft_tie_gap_epsilon: 0.01
  pair_ft_min_score_spread_floor: 0.008
  pair_ft_min_same_state_gap_floor: 0.008
  pair_ft_min_unique_score_floor: 12
  pair_ft_selection_accuracy_tie_epsilon: 0.0001
  pair_ft_stage4_mix_every_n_steps: 4
  pair_ft_resolution_loss_weight: 0.02
  pair_ft_resolution_min_score_gap: 0.03
  pair_ft_resolution_min_logit_gap: 0.14
  pair_ft_stage1_resolution_loss_weight: 0.0
  pair_ft_stage1_resolution_min_score_gap: 0.015
  pair_ft_stage1_resolution_mode: "fixed"
  pair_ft_stage1_resolution_alpha: 0.2
  pair_ft_stage1_resolution_max_score_gap: 0.05
  pair_ft_stage1_resolution_apply_trusted_only: true
  pair_ft_stage1_tail_epochs: 0
  pair_ft_stage1_tail_apply_trusted_only: true
  pair_ft_stage1_tail_acceptance_enabled: true
  pair_ft_stage1_tail_acceptance_acc_tolerance: 0.01
  pair_ft_stage1_tail_acceptance_spread_tolerance: 0.001
  pair_ft_stage1_tail_acceptance_gap_tolerance: 0.001
  pair_ft_stage1_tail_sampling_mode: "with_replacement"
  pair_ft_stage1_tail_ranking_loss_weight: null
  pair_ft_stage1_tail_resolution_loss_weight: null
  pair_ft_stage1_tail_anticollapse_weight: 0.0
  pair_ft_stage1_tail_score_range_floor: 0.02
  pair_ft_stage1_tail_score_range_quantile_low: 0.10
  pair_ft_stage1_tail_score_range_quantile_high: 0.90
  pair_ft_stage1_priority_mix_enabled: false
  pair_ft_stage1_priority_mix_fraction: 0.35
  pair_ft_stage1_priority_trusted_only: true
  pair_ft_stage1_phaseb_anticollapse_weight: 0.0
  pair_ft_stage1_phaseb_score_range_floor: 0.02
  pair_ft_stage1_phaseb_score_range_quantile_low: 0.10
  pair_ft_stage1_phaseb_score_range_quantile_high: 0.90
  pair_ft_stage1_phaseb_anticollapse_apply_on: "priority_only"
  pair_ft_stage1_calibration_enabled: false
  pair_ft_stage1_calibration_scale_init: 1.0
  pair_ft_stage1_calibration_bias_init: 0.0
  pair_ft_stage1_calibration_train_scope: "pair_ft_only"
  pair_ft_stage1_softbin_loss_weight: 0.0
  pair_ft_stage1_softbin_num_bins: 16
  pair_ft_stage1_softbin_temperature: 80.0
  pair_ft_stage1_softbin_apply_on: "stage1_probe"
  pair_ft_stage1_softbin_apply_trusted_only: true
  pair_ft_gate_head_enabled: false
  pair_ft_gate_head_scope: "stage1_probe"
  pair_ft_gate_head_type: "monotonic_affine"
  pair_ft_gate_head_hidden_dim: 128
  pair_ft_gate_head_dropout: 0.0
  pair_ft_gate_head_scale_init: 1.0
  pair_ft_gate_head_bias_init: 0.0
  pair_ft_gate_head_train_scope: "pair_ft_only"
  pair_ft_gate_eval_uses_gate_score: false
  pair_ft_gate_softbin_loss_weight: 0.0
  pair_ft_gate_softbin_num_bins: 16
  pair_ft_gate_softbin_temperature: 80.0
  pair_ft_gate_softbin_apply_trusted_only: true
  pair_ft_gate_resolution_loss_weight: 0.0
  pair_ft_gate_ranking_anchor_weight: 0.0
  pair_ft_gate_ranking_anchor_apply_trusted_only: true
  pair_ft_gate_bin_count: 16
  pair_ft_gate_bin_score_mode: "expectation"
  pair_ft_gate_bin_ce_loss_weight: 0.0
  pair_ft_gate_bin_occupancy_loss_weight: 0.0
  pair_ft_gate_bin_apply_trusted_only: true
  pair_ft_gate_bin_target_source: "target_risk"
  pair_ft_random_seed: 42
  pair_ft_deterministic: true
  pair_ft_strict_deterministic_algorithms: false
  pair_ft_save_healthy_candidates: true
  pair_ft_max_healthy_candidates_to_keep: 3
  min_spread_eligible_pairs_for_gate_source: 128
  stage4_aux_min_high_gap_pairs: 128
  stage4_aux_unique_floor: 12
  stage4_aux_target_gap_threshold: 0.068
  uncertainty_weight: 0.1
  pair_finetune_gate_mode: "fallback_all_pairs"

shield:
  candidate_count: 7
  profile: "balanced"
  coarse_top_k: 4
  tail_quantile: 0.9
  risk_threshold: 0.45
  uncertainty_threshold: 0.35
  uncertainty_weight: 0.2
  fallback_action: "DECEL_KEEP"
  replacement_min_risk_margin: 0.104
  replacement_min_risk_margin_blocked: 0.02
  blocked_distance_margin_slope: 0.0
  raw_passthrough_risk_threshold: 0.193
  legacy_replacement_min_risk_margin: 0.05
  legacy_raw_passthrough_risk_threshold: 0.20
  balanced_replacement_min_risk_margin: 0.104
  balanced_raw_passthrough_risk_threshold: 0.193
  protect_merge_lateral_decisions: true
  merge_override_margin: 0.12

shield_trace:
  enabled: false
  seed_list: []
  save_pair_traces: true
  trace_dir_name: "shield_trace"

ppo:
  use_sb3: true
  total_timesteps: 50000
  learning_rate: 0.0003
  gamma: 0.99
  n_steps: 512
  batch_size: 64
  n_epochs: 10
  intervene_penalty: 0.1
  device: "cpu"

distill:
  trigger_buffer_size: 500
  batch_size: 64
  learning_rate: 0.0005
  epochs: 10
  interval_steps: 10000

eval:
  eval_episodes: 30
  seed_list: [42, 123, 2024]
  target_collision_reduction: 0.4
  max_efficiency_drop: 0.1
  low_speed_threshold_mps: 2.0
  min_avg_speed_guard: 10.0
  min_avg_speed_ratio_guard: 0.6
  max_low_speed_step_rate_guard: 0.15

tensorboard:
  enabled: true
  root_dir: "safe_rl_output/tensorboard"
  run_name: ""
  flush_secs: 10
