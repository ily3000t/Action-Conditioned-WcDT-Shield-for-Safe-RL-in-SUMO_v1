high_blocked_low_replacement:
  enabled: true
  shield_blocked_steps_min: 80
  replacement_rate_max: 0.15

high_near_risk:
  enabled: true
  near_risk_step_rate_min: 0.05
  min_ttc_max: 1.5
  min_distance_max: 3.0

low_task_reward:
  enabled: true
  mean_task_reward_delta_max: -0.02
  mean_penalized_reward_delta_max: -0.02

heading_anomaly:
  enabled: true
  heading_abs_deg_threshold: 45.0
  heading_jump_deg_threshold: 60.0
  min_consecutive_steps: 5
  min_jump_count: 3

negative_vx_anomaly:
  enabled: true
  vx_negative_threshold: -0.5
  min_consecutive_steps: 5
